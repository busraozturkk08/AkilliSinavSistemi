<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SınavAsistan | Akıllı Planlama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="flex min-h-screen">
        <aside class="w-72 sidebar-gradient text-white p-6 shadow-2xl flex flex-col sticky top-0 h-screen">
            <div class="flex items-center gap-3 mb-10 px-2"><div class="bg-violet-400 p-2 rounded-xl"><i data-lucide="shield-check" class="text-white"></i></div><h1 class="text-xl font-bold tracking-tight">SınavAsistan</h1></div>
            <nav class="space-y-2 flex-1">
                <a href="tanimlamalar.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-white/5 text-violet-200"><i data-lucide="settings" class="w-5 h-5"></i><span>Tanımlamalar</span></a>
                <a href="mazeret.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-white/5 text-violet-200"><i data-lucide="user-x" class="w-5 h-5"></i><span>Hoca Mazeret</span></a>
                <a href="planlama.html" class="nav-btn-active flex items-center gap-3 px-4 py-3 rounded-xl transition"><i data-lucide="cpu" class="w-5 h-5"></i><span>Akıllı Planlama</span></a>
                <a href="takvim.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-white/5 text-violet-200"><i data-lucide="calendar" class="w-5 h-5"></i><span>Sınav Takvimi</span></a>
            </nav>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto animate-fadeIn">
            <header class="mb-8"><h2 class="text-3xl font-extrabold text-slate-800">Akıllı Salon Planlama</h2></header>
            <div class="bg-white p-8 rounded-3xl border border-slate-200 max-w-4xl">
                <div class="p-6 bg-indigo-50 border-l-4 border-indigo-500 rounded-2xl mb-6">
                    <h4 class="font-bold text-indigo-900 text-lg">YZM 2126 - Veritabanı Sistemleri</h4>
                    <p class="text-indigo-700">Öğrenci Sayısı: 132</p>
                </div>
                <button onclick="calculatePlanning()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg flex items-center justify-center gap-2">
                    <i data-lucide="sparkles" class="w-5 h-5"></i> Kombinasyon Hesapla
                </button>
                <div id="planResult" class="hidden mt-8 space-y-4"><div id="oneriListe" class="space-y-3"></div></div>
            </div>
        </main>
    </div>
    
    <script>lucide.createIcons();</script>
    <script src="js/global.js"></script>
<script src="js/planlama.js"></script>
</body>
</html>
