<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SınavAsistan | Tanımlamalar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="flex min-h-screen">
        <aside class="w-72 sidebar-gradient text-white p-6 shadow-2xl flex flex-col sticky top-0 h-screen">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-violet-400 p-2 rounded-xl">
                    <i data-lucide="shield-check" class="text-white"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight">SınavAsistan</h1>
            </div>
            <nav class="space-y-2 flex-1">
                <a href="tanimlamalar.html" class="nav-btn-active flex items-center gap-3 px-4 py-3 rounded-xl transition">
                    <i data-lucide="settings" class="w-5 h-5"></i><span>Tanımlamalar</span>
                </a>
                <a href="mazeret.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-white/5 text-violet-200">
                    <i data-lucide="user-x" class="w-5 h-5"></i><span>Hoca Mazeret</span>
                </a>
                <a href="planlama.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-white/5 text-violet-200">
                    <i data-lucide="cpu" class="w-5 h-5"></i><span>Akıllı Planlama</span>
                </a>
                <a href="takvim.html" class="flex items-center gap-3 px-4 py-3 rounded-xl transition hover:bg-white/5 text-violet-200">
                    <i data-lucide="calendar" class="w-5 h-5"></i><span>Sınav Takvimi</span>
                </a>
            </nav>
            <div class="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10 text-xs">
                <p class="text-violet-300">Giriş Yapıldı: <span class="text-white font-bold">Yönetici (Admin)</span></p>
            </div>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto animate-fadeIn">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-8">
                    <header class="mb-8">
                        <h2 class="text-3xl font-extrabold text-slate-800">Sistem Tanımlamaları</h2>
                        <p class="text-slate-500">Mekan, Personel ve Ders verilerini yönetin.</p>
                    </header>
                    <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                        <form id="definitionForm" class="space-y-4" onsubmit="handleRegistration(event)">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label for="regType" class="text-sm font-semibold text-slate-700">Kayıt Türü</label>
                                    <select id="regType" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                                        <option value="derslik">Derslik (Mekan)</option>
                                        <option value="personel">Personel (Hoca)</option>
                                        <option value="ders">Ders Bilgisi</option>
                                    </select>
                                </div>
                                <div class="space-y-2">
                                    <label for="regTitle" class="text-sm font-semibold text-slate-700">Ad / Tanım</label>
                                    <input type="text" id="regTitle" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label for="regValue" class="text-sm font-semibold text-slate-700">Kapasite / Bölüm</label>
                                <input type="text" id="regValue" class="w-full p-3 bg-slate-50 border rounded-xl outline-none">
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 shadow-lg">Sisteme Kaydet</button>
                        </form>
                    </div>
                </div>
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden sticky top-10 flex flex-col h-[calc(100vh-80px)]">
                        <div class="p-6 border-b border-slate-100 bg-slate-50/50"><h3 class="font-bold text-slate-700 flex items-center gap-2"><i data-lucide="history" class="w-5 h-5 text-indigo-600"></i> İşlem Geçmişi</h3></div>
                        <div id="recentActivityList" class="p-6 space-y-4 overflow-y-auto flex-1"><p class="text-sm text-slate-400 text-center py-10 italic">İşlemler burada listelenir.</p></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>lucide.createIcons();</script>
    <script src="js/global.js"></script>
<script src="js/tanimlamalar.js"></script>
</body>
</html>
